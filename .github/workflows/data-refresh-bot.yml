name: Data refresh bot

# Daily 00:00 America/Sao_Paulo (UTC-3) → 03:00 UTC
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report only — skip fetch'
        type: boolean
        default: false
      force_publish:
        description: 'After verify, always PATCH bump + tag (even if no drift)'
        type: boolean
        default: false
      reason:
        description: 'Audit reason (required when force_publish=true)'
        type: string
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate force_publish reason
        if: inputs.force_publish == true
        run: |
          if [ -z "${{ inputs.reason }}" ]; then
            echo "reason input is required when force_publish=true"
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh reference datasets
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm data:refresh:report
          else
            pnpm data:refresh
          fi

      - name: Verify monorepo
        run: pnpm verify

      - name: Write job summary
        if: always()
        run: |
          if [ -f data/refresh-reports/job-summary.md ]; then
            cat data/refresh-reports/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f data/refresh-reports/latest.json ]; then
            echo '### Data refresh report' >> "$GITHUB_STEP_SUMMARY"
            cat data/refresh-reports/latest.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Detect dataset drift
        id: drift
        run: |
          if [ ! -f data/refresh-reports/latest.json ]; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(node -e "const fs=require('node:fs'); const r=JSON.parse(fs.readFileSync('data/refresh-reports/latest.json','utf8')); process.stdout.write(String(r.resumo?.datasetsAlterados ?? 0));")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Bump PATCH version
        if: >-
          github.ref == 'refs/heads/main' &&
          (steps.drift.outputs.changed != '0' || inputs.force_publish == true)
        id: bump
        run: node scripts/bump-data-patch.mjs --write-changelog --skip-clean-check >> "$GITHUB_OUTPUT"

      - name: Publish PATCH release (full automation)
        if: >-
          github.ref == 'refs/heads/main' &&
          (steps.drift.outputs.changed != '0' || inputs.force_publish == true)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          REASON="${{ inputs.reason }}"
          if [ -n "$REASON" ]; then
            git commit -m "chore(release): data refresh PATCH v${{ steps.bump.outputs.VERSION }} — ${REASON}"
          else
            git commit -m "chore(release): data refresh PATCH v${{ steps.bump.outputs.VERSION }}"
          fi
          git push origin main
          git tag -a "${{ steps.bump.outputs.TAG }}" -m "Release ${{ steps.bump.outputs.TAG }} — data refresh"
          git push origin "${{ steps.bump.outputs.TAG }}"

      - name: Commit reports only (no drift)
        if: >-
          github.ref == 'refs/heads/main' &&
          steps.drift.outputs.changed == '0' &&
          inputs.force_publish != true &&
          inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/refresh-reports docs/DATA-FRESHNESS.md
          if git diff --staged --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "chore(data): daily refresh reports $(date -u +%Y-%m-%d)"
          git push origin main
