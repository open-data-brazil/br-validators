name: Data refresh bot

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Refresh reference datasets
        run: pnpm data:refresh

      - name: Verify monorepo
        run: pnpm verify

      - name: Write job summary
        if: always()
        run: |
          if [ -f data/refresh-reports/job-summary.md ]; then
            cat data/refresh-reports/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f data/refresh-reports/latest.json ]; then
            echo '### Data refresh report' >> "$GITHUB_STEP_SUMMARY"
            cat data/refresh-reports/latest.json >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create PR if datasets changed
        uses: peter-evans/create-pull-request@v7
        with:
          title: chore(data): weekly refresh
          body-path: data/refresh-reports/pr-body.md
          labels: data-refresh, bot
          branch: bot/data-refresh-${{ github.run_number }}
          commit-message: chore(data): weekly reference data refresh
