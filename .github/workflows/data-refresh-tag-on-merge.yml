name: Data refresh tag on merge

# After a bot/data-release/* PR merges to main, push the version tag → release.yml publishes npm.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'bot/data-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.DATA_REFRESH_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/br-validators/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push release tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }} — data refresh"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Sync developing
        if: steps.tag_check.outputs.exists == 'false'
        continue-on-error: true
        run: |
          git fetch origin developing
          git checkout developing
          git merge origin/main -m "chore: sync developing after data refresh release ${{ steps.version.outputs.tag }}"
          git push origin developing
