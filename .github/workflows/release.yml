name: Release

# Publish to npm when a version tag is pushed on main (after merge + version bump).
# CI-only: local pnpm publish is blocked by scripts/assert-ci-publish.mjs.
# Publishes all six @br-validators/* packages (see docs/BRANCHING.md).
# Requires repository secret: NPM_TOKEN (Automation or granular — read/write + create on @br-validators/*).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.11.0-alpha.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-alpha* ]]; then NPM_TAG=alpha
          elif [[ "$VERSION" == *-beta* ]]; then NPM_TAG=beta
          elif [[ "$VERSION" == *-rc* ]]; then NPM_TAG=rc
          else NPM_TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Verify tag matches package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CORE="$(jq -r .version packages/br-validators/package.json)"
          CLI="$(jq -r .version apps/cli/package.json)"
          ZOD="$(jq -r .version packages/br-validators-zod/package.json)"
          RHF="$(jq -r .version packages/br-validators-rhf/package.json)"
          EXPRESS="$(jq -r .version packages/br-validators-express/package.json)"
          VUE="$(jq -r .version packages/br-validators-vue/package.json)"
          if [ "$VERSION" != "$CORE" ] || [ "$VERSION" != "$CLI" ] || [ "$VERSION" != "$ZOD" ] || [ "$VERSION" != "$RHF" ] || [ "$VERSION" != "$EXPRESS" ] || [ "$VERSION" != "$VUE" ]; then
            echo "Tag version $VERSION does not match package.json (core=$CORE, cli=$CLI, zod=$ZOD, rhf=$RHF, express=$EXPRESS, vue=$VUE)"
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm verify

      - name: Publish npm packages (CI only)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NPM_TAG="${{ steps.version.outputs.npm_tag }}"
          chmod +x scripts/publish-npm-if-missing.sh
          ./scripts/publish-npm-if-missing.sh @br-validators/core @br-validators/core "$VERSION" "$NPM_TAG"
          ./scripts/publish-npm-if-missing.sh @br-validators/cli @br-validators/cli "$VERSION" "$NPM_TAG"
          ./scripts/publish-npm-if-missing.sh @br-validators/zod @br-validators/zod "$VERSION" "$NPM_TAG"
          ./scripts/publish-npm-if-missing.sh @br-validators/react-hook-form @br-validators/react-hook-form "$VERSION" "$NPM_TAG"
          ./scripts/publish-npm-if-missing.sh @br-validators/express @br-validators/express "$VERSION" "$NPM_TAG"
          ./scripts/publish-npm-if-missing.sh @br-validators/vue @br-validators/vue "$VERSION" "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm registry
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wait_for_version() {
            local pkg="$1"
            local attempt=1
            while [ "$attempt" -le 12 ]; do
              PUBLISHED="$(npm view "${pkg}@${VERSION}" version 2>/dev/null || true)"
              if [ "$PUBLISHED" = "$VERSION" ]; then
                echo "OK: ${pkg}@${VERSION}"
                return 0
              fi
              echo "WAIT: ${pkg}@${VERSION} not visible yet (attempt ${attempt}/12)"
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "Expected ${pkg}@${VERSION}, got: ${PUBLISHED:-<missing>}"
            return 1
          }
          for PKG in core cli zod react-hook-form express vue; do
            wait_for_version "@br-validators/${PKG}"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Point npm latest at release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm dist-tag add "@br-validators/core@${VERSION}" latest
          npm dist-tag add "@br-validators/cli@${VERSION}" latest
          npm dist-tag add "@br-validators/zod@${VERSION}" latest
          npm dist-tag add "@br-validators/react-hook-form@${VERSION}" latest
          npm dist-tag add "@br-validators/express@${VERSION}" latest
          npm dist-tag add "@br-validators/vue@${VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
